<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="col" style="gap: 16px;">
    <div style="display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; align-items:center; justify-items:center;">
      <img src="../assets/tab-home.svg" title="home" style="width:28px; height:28px;">
      <img src="../assets/tab-server.svg" title="server" style="width:28px; height:28px;">
      <img src="../assets/tab-app.svg" title="apps" style="width:28px; height:28px;">
      <img src="../assets/tab-settings.svg" title="settings" style="width:28px; height:28px;">
      <img src="../assets/icon-speed.svg" title="speed" style="width:28px; height:28px;">
      <img src="../assets/icon-download.svg" title="download" style="width:28px; height:28px; color: var(--fg-1);">
      <img src="../assets/icon-upload.svg" title="upload" style="width:28px; height:28px;">
      <img src="../assets/icon-signal.svg" title="signal" style="width:28px; height:28px;">
    </div>
    <div style="display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; align-items:center; justify-items:center;">
      <img src="../assets/tab-home-active.svg" title="home active" style="width:28px; height:28px;">
      <img src="../assets/tab-server-active.svg" title="server active" style="width:28px; height:28px;">
      <img src="../assets/tab-app-active.svg" title="apps active" style="width:28px; height:28px;">
      <img src="../assets/tab-settings-active.svg" title="settings active" style="width:28px; height:28px;">
      <img src="../assets/power.svg" title="power" style="width:32px; height:32px; color: var(--fg-1);">
      <img src="../assets/flag-de.svg" title="DE" style="width:28px; height:28px; border-radius:4px;">
      <div style="width:28px; height:28px;"></div>
      <div style="width:28px; height:28px;"></div>
    </div>
    <div style="font-size: 13px; color: var(--fg-2); line-height: 1.5;">
      <strong>SVG, single-path, currentColor-fillable.</strong> 24px viewport. Inactive icons use
      <code>--fg-2 #B6B6B6</code>; active uses <code>--fg-1 #303F49</code> or the brand gradient on the connect button.
    </div>
  </div>
</body></html>
