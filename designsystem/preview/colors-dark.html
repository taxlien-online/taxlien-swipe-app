<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="background: var(--bg-dark); color: var(--fg-1-dark);">
  <div class="row" style="gap: 12px;">
    <div class="swatch" style="background: var(--bg-dark); flex: 1; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);">
      <div class="name">--bg-dark</div><div class="hex">#0F1419</div>
    </div>
    <div class="swatch" style="background: var(--surface-dark); flex: 1;">
      <div class="name">--surface-dark</div><div class="hex">#1A2129</div>
    </div>
    <div class="swatch" style="background: var(--surface-dark-2); flex: 1;">
      <div class="name">surface-dark-2</div><div class="hex">#222B33</div>
    </div>
    <div class="swatch light" style="background: var(--fg-1-dark); color: var(--fg-1); flex: 1;">
      <div class="name">--fg-1-dark</div><div class="hex">#E7ECEF</div>
    </div>
    <div class="swatch" style="background: var(--switch-track-dark); flex: 1;">
      <div class="name">switch-track</div><div class="hex">#3A4750</div>
    </div>
  </div>
  <div style="margin-top: 14px; font-size: 13px; color: rgba(231,236,239,0.6); line-height: 1.5;">
    Dark theme inverts neutrals only — the gradient is unchanged. Primary becomes <strong>cyan</strong>,
    secondary becomes <strong>blue</strong>.
  </div>
</body></html>
