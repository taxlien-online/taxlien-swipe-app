<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="row" style="gap: 12px;">
    <div class="swatch light" style="background: var(--bg); flex: 1; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);">
      <div class="name">--bg</div><div class="hex">#F8F9FA</div>
    </div>
    <div class="swatch light" style="background: var(--surface); flex: 1; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);">
      <div class="name">--surface</div><div class="hex">#FFFFFF</div>
    </div>
    <div class="swatch" style="background: var(--fg-1); flex: 1;">
      <div class="name">--fg-1</div><div class="hex">#303F49</div>
    </div>
    <div class="swatch" style="background: var(--fg-2); flex: 1;">
      <div class="name">--fg-2</div><div class="hex">#B6B6B6</div>
    </div>
    <div class="swatch light" style="background: var(--disabled); flex: 1;">
      <div class="name">--disabled</div><div class="hex">#E0E0E0</div>
    </div>
  </div>
  <div style="margin-top: 14px; font-size: 13px; color: var(--fg-2); line-height: 1.5;">
    Page sits on <code>--bg</code>; all cards are <code>--surface</code>. Text is <code>--fg-1</code> (primary) or
    <code>--fg-2</code> (muted / placeholder / secondary state).
  </div>
</body></html>
