<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="background: var(--bg);">
  <div class="col" style="gap: 14px;">
    <!-- Primary filled -->
    <button style="width: 100%; padding: 16px; border-radius: 12px; border: 0;
            background: var(--brand-gradient); color: white;
            font: 500 17px var(--font-family); cursor: pointer; box-shadow: var(--shadow-card);">
      Подключиться
    </button>
    <!-- Primary solid blue -->
    <button style="width: 100%; padding: 16px; border-radius: 12px; border: 0;
            background: var(--brand-blue); color: white;
            font: 500 17px var(--font-family); cursor: pointer;">
      Оплатить
    </button>
    <!-- Outline -->
    <button style="width: 100%; padding: 15px; border-radius: 12px;
            background: transparent; color: var(--fg-1);
            border: 1px solid var(--line);
            font: 500 17px var(--font-family); cursor: pointer;">
      Отмена
    </button>
    <!-- Disabled -->
    <button disabled style="width: 100%; padding: 16px; border-radius: 12px; border: 0;
            background: var(--disabled); color: var(--fg-2);
            font: 500 17px var(--font-family); cursor: not-allowed;">
      Подключиться
    </button>
  </div>
</body></html>
