<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="background: var(--bg);">
  <div class="col" style="gap: 14px;">
    <!-- Search field -->
    <div style="background: var(--surface); border-radius: 10px; padding: 12px 14px; box-shadow: var(--shadow-card); display:flex; align-items:center; gap: 10px;">
      <svg width="18" height="18" viewBox="0 0 24 24" style="color: var(--fg-2);"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
      <div style="flex: 1; font-size: 17px; color: var(--fg-2);">Поиск страны</div>
    </div>
    <!-- Filled text input -->
    <div style="background: var(--surface); border-radius: 10px; padding: 12px 14px; box-shadow: var(--shadow-card); display:flex; align-items:center; gap: 10px;">
      <div style="flex: 1; font-size: 17px; color: var(--fg-1);">PROMO2026</div>
      <div style="padding: 4px 10px; border-radius: 999px; background: var(--success); color: white; font-size: 12px; font-weight: 500;">−20%</div>
    </div>
    <!-- Typing state (focused) -->
    <div style="background: var(--surface); border-radius: 10px; padding: 12px 14px; box-shadow: 0 0 0 2px color-mix(in oklab, var(--brand-blue), transparent 70%), var(--shadow-card); display:flex; align-items:center; gap: 10px;">
      <div style="flex: 1; font-size: 17px; color: var(--fg-1);">user@example.com<span style="display:inline-block; width:1.5px; height: 17px; background: var(--brand-blue); margin-left: 2px; vertical-align: middle; animation: blink 1s steps(1) infinite;"></span></div>
    </div>
  </div>
  <style>@keyframes blink { 50% { opacity: 0; } }</style>
</body></html>
