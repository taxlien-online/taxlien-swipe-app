<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="background: var(--bg);">
  <div class="row" style="gap: 14px;">
    <div style="flex:1; background: var(--surface); border-radius: 10px; padding: 14px; box-shadow: var(--shadow-card); display:flex; flex-direction: column; align-items: center; gap: 6px;">
      <img src="../assets/icon-download.svg" style="width: 24px; height: 24px; color: var(--fg-1);" alt="">
      <div style="font-size: 14px; font-weight: 500; color: var(--fg-1);">24.2 Mb/s</div>
    </div>
    <div style="flex:1; background: var(--surface); border-radius: 10px; padding: 14px; box-shadow: var(--shadow-card); display:flex; flex-direction: column; align-items: center; gap: 6px;">
      <img src="../assets/icon-upload.svg" style="width: 24px; height: 24px;" alt="">
      <div style="font-size: 14px; font-weight: 500; color: var(--fg-1);">8.1 Mb/s</div>
    </div>
    <div style="flex:1; background: var(--surface); border-radius: 10px; padding: 14px; box-shadow: var(--shadow-card); display:flex; flex-direction: column; align-items: center; gap: 6px;">
      <img src="../assets/icon-signal.svg" style="width: 24px; height: 24px;" alt="">
      <div style="font-size: 14px; font-weight: 500; color: var(--fg-1);">42 ms</div>
    </div>
  </div>
  <div style="margin-top: 14px; font-size: 13px; color: var(--fg-2); line-height: 1.5;">
    Stat tiles · 14 / 500 label · 6px gap · 14px padding · used as a row of three on Home.
  </div>
</body></html>
