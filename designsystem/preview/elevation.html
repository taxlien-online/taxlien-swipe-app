<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="row" style="gap: 24px; align-items: flex-start;">
    <div class="col" style="gap: 8px; flex: 1;">
      <div style="height: 60px; background: var(--surface); border-radius: 10px; box-shadow: var(--shadow-card);"></div>
      <div class="muted">--shadow-card</div>
      <div class="mono">0 1px 32px 0 rgba(156,178,194,0.10)</div>
      <div style="font-size: 12px; color: var(--fg-2); line-height: 1.4;">The only shadow used app-wide.</div>
    </div>
    <div class="col" style="gap: 8px; flex: 1;">
      <div style="height: 60px; background: var(--surface); border-radius: 10px; box-shadow: var(--shadow-card-strong);"></div>
      <div class="muted">--shadow-card-strong</div>
      <div class="mono">0 4px 24px 0 rgba(156,178,194,0.22)</div>
      <div style="font-size: 12px; color: var(--fg-2); line-height: 1.4;">Use sparingly — picked-up tiles, drag previews.</div>
    </div>
    <div class="col" style="gap: 8px; flex: 1;">
      <div style="height: 60px; background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-modal);"></div>
      <div class="muted">--shadow-modal</div>
      <div class="mono">0 12px 48px 0 rgba(20,35,50,0.20)</div>
      <div style="font-size: 12px; color: var(--fg-2); line-height: 1.4;">Sheets, dialogs, popovers.</div>
    </div>
  </div>
</body></html>
