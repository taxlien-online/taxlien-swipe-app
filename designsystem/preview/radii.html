<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="row" style="gap: 18px; align-items: flex-end;">
    <div class="col" style="align-items: center; gap: 8px;">
      <div style="width: 70px; height: 70px; background: var(--surface); border-radius: 8px; box-shadow: 0 0 0 1px rgba(0,0,0,0.06);"></div>
      <div class="muted">8 · --radius-sm</div>
    </div>
    <div class="col" style="align-items: center; gap: 8px;">
      <div style="width: 70px; height: 70px; background: var(--surface); border-radius: 10px; box-shadow: var(--shadow-card);"></div>
      <div class="muted">10 · cards</div>
    </div>
    <div class="col" style="align-items: center; gap: 8px;">
      <div style="width: 70px; height: 70px; background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-card);"></div>
      <div class="muted">16 · --radius-lg</div>
    </div>
    <div class="col" style="align-items: center; gap: 8px;">
      <div style="width: 70px; height: 70px; background: var(--surface); border-radius: 20px; box-shadow: var(--shadow-card);"></div>
      <div class="muted">20 · --radius-xl</div>
    </div>
    <div class="col" style="align-items: center; gap: 8px;">
      <div style="width: 110px; height: 36px; background: var(--surface); border-radius: 999px; box-shadow: var(--shadow-card);"></div>
      <div class="muted">pill</div>
    </div>
    <div class="col" style="align-items: center; gap: 8px;">
      <div style="width: 70px; height: 70px; background: var(--brand-gradient); border-radius: 50%;"></div>
      <div class="muted">circle · connect button</div>
    </div>
  </div>
  <div style="margin-top: 16px; font-size: 13px; color: var(--fg-2); line-height: 1.5;">
    Cards use 10px. Bigger CTA surfaces (payment) use 16. Avoid 4 and 24+ — they don't appear in source.
  </div>
</body></html>
